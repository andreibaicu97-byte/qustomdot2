<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QustomDot — 3D Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black:        #050000;
      --red:          #e52726;
      --green:        #61cc2e;
      --orange:       #f29220;
      --yellow:       #f9c416;
      --white:        #ffffff;
      --gray:         #888888;
      --glass-bg:     rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.14);
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.55), 0 1px 0 rgba(255,255,255,0.08) inset;
      --blur:         blur(22px) saturate(160%);
      --panel-bg:     rgba(8,6,6,0.98);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: #000;
      color: var(--white);
      font-family: 'Roboto', Helvetica, Arial, sans-serif;
      overflow: hidden;
      height: 100vh; width: 100vw;
      user-select: none;
    }

    /* ── Upload Screen ─────────────────────────────────────────────────── */
    #upload-screen {
      position: fixed; inset: 0;
      background: var(--black);
      display: flex; flex-direction:column;
      align-items:center; justify-content:center;
      z-index: 200;
      transition: opacity 0.6s;
    }
    #upload-screen.out { opacity:0; pointer-events:none; }

    .upload-wordmark {
      font-size:10px; font-weight:700;
      letter-spacing:0.45em; text-transform:uppercase;
      margin-bottom:52px;
    }
    .upload-wordmark span { color:var(--red); }

    .upload-zone {
      position:relative;
      border:1px solid rgba(255,255,255,0.12);
      padding:52px 72px; min-width:440px;
      text-align:center; cursor:pointer;
      transition: border-color .2s, background .2s;
    }
    .upload-zone:hover,
    .upload-zone.over { border-color:var(--red); background:rgba(229,39,38,.04); }
    .upload-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; }
    .upload-icon { width:38px; height:38px; margin:0 auto 18px; opacity:.3; }
    .upload-title { font-size:13px; font-weight:500; letter-spacing:.06em; margin-bottom:7px; }
    .upload-sub   { font-size:11px; font-weight:300; color:var(--gray); letter-spacing:.04em; }

    /* ── Experience shell (black bars) ─────────────────────────────────── */
    #experience {
      position: fixed; inset: 0;
      display: none;
      align-items:center; justify-content:center;
      background: #000;
    }
    #experience.active { display:flex; }

    /* ── Stage — locked 16:9 ────────────────────────────────────────────── */
    #stage {
      position: relative;
      /* Fills the largest 16:9 rect that fits in the viewport */
      width:  min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9  / 16));
      background: var(--black);
      overflow: hidden;
      flex-shrink: 0;
    }

    /* ── Video ──────────────────────────────────────────────────────────── */
    #video-wrap {
      position:absolute; inset:0;
      background:#000; cursor:pointer;
    }
    #video { width:100%; height:100%; object-fit:contain; display:block; }

    #play-pulse {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%) scale(0);
      width:80px; height:80px; border-radius:50%;
      background:rgba(229,39,38,.18);
      display:flex; align-items:center; justify-content:center;
      pointer-events:none; opacity:0;
    }
    #play-pulse.flash { animation:pulse .45s ease-out forwards; }
    @keyframes pulse {
      0%   { transform:translate(-50%,-50%) scale(.3); opacity:1; }
      100% { transform:translate(-50%,-50%) scale(1.8); opacity:0; }
    }

    /* ── Overlays container (fills stage) ──────────────────────────────── */
    #overlays-wrap {
      position:absolute; inset:0;
      pointer-events:none;
      z-index:10;
    }

    /* Viewer card — position driven by JS via left/top % */
    .overlay-card {
      position:absolute;
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border:1px solid var(--glass-border);
      border-radius:16px;
      padding:18px 22px 20px;
      width:clamp(260px, 30%, 460px);
      box-shadow: var(--glass-shadow);
      opacity:0;
      transform:translateY(6px);
      transition: opacity .4s ease, transform .4s ease;
      overflow:hidden;
    }
    .overlay-card::before {
      content:'';
      position:absolute; top:0; left:20px; right:20px; height:1px;
      background:linear-gradient(90deg, transparent, rgba(229,39,38,.7), transparent);
    }
    .overlay-card.show { opacity:1; transform:translateY(0); }

    /* Drag handle – hidden in normal mode, shown in edit mode */
    .drag-handle {
      display:none;
      position:absolute; top:10px; right:10px;
      width:22px; height:22px;
      align-items:center; justify-content:center;
      color:rgba(255,255,255,.4);
      cursor:grab;
      transition:color .15s;
      z-index:2;
    }
    .drag-handle:hover { color:rgba(255,255,255,.85); }
    .drag-handle svg { width:14px; height:14px; display:block; }

    /* Edit-mode: show drag handles, enable pointer events, dashed outline */
    body.edit-mode .overlay-card.show {
      pointer-events:all;
      cursor:grab;
      outline:1px dashed rgba(229,39,38,.35);
      outline-offset:2px;
    }
    body.edit-mode .overlay-card.show:active { cursor:grabbing; }
    body.edit-mode .overlay-card.show .drag-handle { display:flex; }

    .overlay-badge {
      display:inline-flex; align-items:center; gap:5px;
      background:rgba(229,39,38,.18);
      border:1px solid rgba(229,39,38,.35);
      border-radius:100px;
      padding:3px 10px 3px 7px;
      margin-bottom:10px;
    }
    .overlay-badge-dot { width:5px; height:5px; border-radius:50%; background:var(--red); flex-shrink:0; }
    .overlay-badge-text { font-size:8px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--red); }
    .overlay-title { font-size:15px; font-weight:500; color:rgba(255,255,255,.95); margin-bottom:6px; line-height:1.3; }
    .overlay-desc  { font-size:12px; font-weight:300; line-height:1.65; color:rgba(255,255,255,.68); }

    /* ── Top-right buttons ──────────────────────────────────────────────── */
    #top-right {
      position:absolute; top:22px; right:22px;
      display:flex; gap:8px; z-index:20;
      transition:right .32s cubic-bezier(.25,.46,.45,.94);
    }
    #edit-btn {
      background:rgba(5,0,0,.45);
      backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.14);
      border-radius:8px;
      color:rgba(255,255,255,.55);
      width:36px; height:36px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer;
      transition:border-color .18s, color .18s, background .18s;
      padding:0;
    }
    #edit-btn:hover { border-color:rgba(255,255,255,.35); color:rgba(255,255,255,.9); }
    #edit-btn.active { background:var(--red); border-color:var(--red); color:var(--white); }

    /* ── Brand mark ─────────────────────────────────────────────────────── */
    #brand-mark {
      position:absolute; top:18px; left:20px;
      pointer-events:none; z-index:20;
    }
    #brand-mark img {
      height:72px; width:auto;
      opacity:.9;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,.6));
    }

    /* ── Scroll hint ────────────────────────────────────────────────────── */
    #scroll-hint {
      position:absolute; bottom:80px; right:22px;
      font-size:10px; font-weight:300;
      letter-spacing:.08em; color:rgba(255,255,255,.24);
      pointer-events:none; z-index:10;
      transition:opacity .3s;
    }
    body.edit-mode #scroll-hint { opacity:0; }


    /* ── Controls bar ───────────────────────────────────────────────────── */
    #controls {
      position:absolute; bottom:0; left:0; right:0;
      height:64px; padding:0 20px;
      display:flex; align-items:center; gap:14px;
      background:linear-gradient(transparent, rgba(0,0,0,.9));
      z-index:20;
    }
    #play-btn {
      flex-shrink:0; background:none; border:none;
      cursor:pointer; color:var(--white);
      width:32px; height:32px;
      display:flex; align-items:center; justify-content:center;
      opacity:.8; transition:opacity .15s;
    }
    #play-btn:hover { opacity:1; }
    #timeline {
      flex:1; height:3px;
      background:rgba(255,255,255,.13);
      border-radius:100px; cursor:pointer;
      position:relative; transition:height .15s;
    }
    #timeline:hover { height:5px; }
    #tl-fill {
      position:absolute; left:0; top:0;
      height:100%; width:0%;
      background:var(--red); border-radius:100px;
      pointer-events:none; transition:width .05s linear;
    }
    #tl-thumb {
      position:absolute; top:50%;
      width:11px; height:11px;
      background:var(--white); border-radius:50%;
      transform:translate(-50%,-50%) scale(0);
      pointer-events:none; transition:transform .15s;
      box-shadow:0 1px 4px rgba(0,0,0,.6);
    }
    #timeline:hover #tl-thumb { transform:translate(-50%,-50%) scale(1); }
    .tl-marker {
      position:absolute; top:-4px;
      width:2px; height:11px;
      background:var(--yellow);
      border-radius:1px;
      transform:translateX(-50%);
      pointer-events:none; opacity:.75;
    }
    #time-label {
      flex-shrink:0;
      font-size:11px; font-weight:300;
      letter-spacing:.03em; color:rgba(255,255,255,.45);
      min-width:90px; text-align:right;
    }

    /* ── Edit Panel ─────────────────────────────────────────────────────── */
    #edit-panel {
      position:absolute; top:0; right:0; bottom:0;
      width:400px;
      background:var(--panel-bg);
      border-left:1px solid rgba(255,255,255,.07);
      display:flex; flex-direction:column;
      transform:translateX(100%);
      transition:transform .32s cubic-bezier(.25,.46,.45,.94);
      z-index:30;
    }
    #edit-panel.open { transform:translateX(0); }

    .ep-hd {
      padding:20px 22px 17px;
      border-bottom:1px solid rgba(255,255,255,.07);
      flex-shrink:0;
      display:flex; align-items:center; justify-content:space-between;
    }
    .ep-hd h2 { font-size:11px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--red); }
    .ep-hd p  { font-size:10px; font-weight:300; color:var(--gray); margin-top:3px; letter-spacing:.04em; }

    #add-btn {
      background:transparent; border:1px solid var(--red); border-radius:6px;
      color:var(--red); font-family:'Roboto',sans-serif;
      font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
      padding:7px 13px; cursor:pointer; transition:background .15s, color .15s;
    }
    #add-btn:hover { background:var(--red); color:var(--white); }

    #ep-list {
      flex:1; overflow-y:auto; padding:12px 14px 0;
      scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.08) transparent;
    }
    #ep-list::-webkit-scrollbar { width:4px; }
    #ep-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }

    .ep-card {
      background:rgba(255,255,255,.025);
      border:1px solid rgba(255,255,255,.07);
      border-radius:10px; padding:13px; margin-bottom:9px;
      transition:border-color .15s;
    }
    .ep-card:hover { border-color:rgba(255,255,255,.13); }
    .ep-card.is-active { border-color:rgba(229,39,38,.4); }

    .ep-card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:11px; }
    .ep-card-num { font-size:9px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:rgba(229,39,38,.65); }
    .ep-del {
      background:none; border:1px solid rgba(229,39,38,.22);
      border-radius:5px; color:rgba(229,39,38,.4);
      font-family:'Roboto',sans-serif; font-size:9px; font-weight:500;
      letter-spacing:.08em; text-transform:uppercase;
      padding:4px 9px; cursor:pointer;
      transition:border-color .15s, color .15s;
    }
    .ep-del:hover { border-color:var(--red); color:var(--red); }

    .field-label { display:block; font-size:9px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--gray); margin-bottom:5px; }

    .ep-input, .ep-textarea {
      width:100%; background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08); border-radius:6px;
      color:var(--white); font-family:'Roboto',sans-serif;
      font-weight:300; outline:none; padding:7px 9px;
      transition:border-color .15s; resize:none;
    }
    .ep-input { font-size:12px; }
    .ep-textarea { font-size:12px; line-height:1.55; min-height:64px; }
    .ep-input:focus, .ep-textarea:focus { border-color:var(--red); }

    .ep-times { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
    .ep-time-lbl { font-size:9px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--gray); margin-bottom:5px; display:block; }
    .ep-time-row { display:flex; gap:4px; }
    .ep-time-inp {
      flex:1; min-width:0; background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08); border-radius:6px;
      color:var(--white); font-family:'Roboto',sans-serif;
      font-size:12px; font-weight:400; padding:6px 8px; outline:none;
      transition:border-color .15s;
    }
    .ep-time-inp:focus { border-color:var(--red); }
    .ep-now {
      background:rgba(249,196,22,.07); border:1px solid rgba(249,196,22,.2);
      border-radius:5px; color:rgba(249,196,22,.55);
      font-family:'Roboto',sans-serif; font-size:9px;
      padding:0 7px; cursor:pointer; white-space:nowrap;
      transition:border-color .15s, color .15s;
    }
    .ep-now:hover { border-color:var(--yellow); color:var(--yellow); }

    .ep-ft {
      padding:13px 22px; border-top:1px solid rgba(255,255,255,.07);
      flex-shrink:0; display:flex; align-items:center; justify-content:space-between;
    }
    #save-status { font-size:10px; font-weight:300; letter-spacing:.04em; color:var(--gray); transition:color .2s; }
    #save-status.saved   { color:var(--green); }
    #save-status.unsaved { color:var(--orange); }

    #save-btn {
      background:var(--red); border:none; border-radius:7px;
      color:var(--white); font-family:'Roboto',sans-serif;
      font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
      padding:10px 20px; cursor:pointer; transition:opacity .15s;
    }
    #save-btn:hover { opacity:.82; }

    /* Drag position tooltip */
    #drag-pos {
      position:absolute;
      background:rgba(5,0,0,.72);
      backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.1); border-radius:6px;
      font-size:9px; font-weight:500; letter-spacing:.08em;
      color:rgba(255,255,255,.6); padding:4px 9px;
      pointer-events:none; z-index:50;
      opacity:0; transition:opacity .15s;
    }
    #drag-pos.show { opacity:1; }
  </style>
</head>
<body>

  <!-- Upload Screen -->
  <div id="upload-screen">
    <div class="upload-wordmark">Q U S T O M D O T <span>.</span></div>
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept="video/*">
      <svg class="upload-icon" viewBox="0 0 40 40" fill="none">
        <path d="M20 6V28M20 6L11 15M20 6L29 15" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M6 30V33C6 34.1 6.9 35 8 35H32C33.1 35 34 34.1 34 33V30" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <div class="upload-title">Import your 3D animation</div>
      <div class="upload-sub">Drag & drop or click — MP4, MOV, WebM accepted</div>
    </div>
  </div>

  <!-- Experience -->
  <div id="experience">
    <div id="stage">

      <!-- Video -->
      <div id="video-wrap">
        <video id="video" playsinline></video>
        <div id="play-pulse">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="rgba(255,255,255,0.9)"><path d="M7 4.5L17.5 11L7 17.5V4.5Z"/></svg>
        </div>
      </div>

      <!-- Overlay cards (injected by JS) -->
      <div id="overlays-wrap"></div>

      <!-- Drag position indicator -->
      <div id="drag-pos"></div>

      <!-- Brand mark -->
      <div id="brand-mark"><img src="./logo.svg" alt="QustomDot"></div>
      <div id="scroll-hint">↕ scroll to navigate</div>

      <!-- Top-right -->
      <div id="top-right">
        <button id="edit-btn" title="Edit overlays">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.5 2L13 4.5L5 12.5H2.5V10L10.5 2Z"/>
            <path d="M9 3.5L11.5 6"/>
          </svg>
        </button>
      </div>

      <!-- Controls -->
      <div id="controls">
        <button id="play-btn">
          <svg id="icon-play"  width="18" height="18" viewBox="0 0 18 18" fill="white"><path d="M5 3.5L14.5 9L5 14.5V3.5Z"/></svg>
          <svg id="icon-pause" width="18" height="18" viewBox="0 0 18 18" fill="white" style="display:none"><rect x="4" y="3" width="3.2" height="12" rx=".5"/><rect x="10.8" y="3" width="3.2" height="12" rx=".5"/></svg>
        </button>
        <div id="timeline">
          <div id="tl-fill"></div>
          <div id="tl-thumb"></div>
        </div>
        <div id="time-label">0:00 / 0:00</div>
      </div>

      <!-- Edit Panel -->
      <div id="edit-panel">
        <div class="ep-hd">
          <div><h2>Edit Mode</h2><p>Manage experience overlays</p></div>
          <button id="add-btn">+ Add</button>
        </div>
        <div id="ep-list"></div>
        <div class="ep-ft">
          <span id="save-status">–</span>
          <button id="save-btn">Save</button>
        </div>
      </div>

    </div><!-- #stage -->
  </div><!-- #experience -->

  <script>
  (() => {
    'use strict';

    const STORAGE_KEY   = 'qd_overlays_v4';
    const DEFAULT_VIDEO = './video.mp4';
    const SCROLL_SPEED  = 0.0047;  // seconds per wheel deltaY unit

    /* ── Default overlays ─────────────────────────────────────────────── */
    const DEFAULTS = [
      { badge:'devices',       title:'QustomDot - Advancing Colour for the next generation of displays.',  description:'For OLED and MicroLED devices, from wearables to larger appliances.',                                                             startTime:0,    endTime:3,    x:0.06508365300293459, y:0.41565217391304343 },
      { badge:'pixel array',   title:'Millions of pixels per display, down to 5μm per pixel',             description:'Every display is an architecture of millions of light points. QustomDot optimizes each for absolute visual fidelity.',           startTime:6,    endTime:9,    x:0.04,                y:0.72                },
      { badge:'single pixel',  title:'One pixel creates millions of colours from red, green and blue',    description:'Independent control of each color component to faithfully reproduce the entire visible spectrum.',                               startTime:12,   endTime:18,   x:0.04,                y:0.72                },
      { badge:'Blue light',    title:'Blue LED',                                                          description:'At its base, each red sub-pixel has a blue LED.',                                                                               startTime:21,   endTime:25,   x:0.03686454337463318, y:0.5784169453734671  },
      { badge:'Color conversion', title:'Cd-free QDCC red ink',                                          description:'From chaos emerges identity. Each light point finds its exact place to form the QustomDot signature — precision, coherence, character.', startTime:21, endTime:25, x:0.03749163469970654, y:0.3654849498327759  },
      { badge:'RED Light',     title:'Red Light',                                                         description:'After the color conversion, vivid red light is emitted.',                                                                        startTime:21,   endTime:25,   x:0.03874581734985327, y:0.15589743589743588 },
      { badge:'zoom in',       title:'The color conversion layer consists of millions of QD\'s.',         description:'Along with scattering particles.',                                                                                               startTime:25.6, endTime:29,   x:0,                   y:0.39335562987736894 },
      { badge:'inkjet printing', title:'Controlled Printing with inkjet printing',                        description:'Our Quantum Dots are deposited onto the substrate thanks to our high precision inkjet printing technology.',                      startTime:32.5, endTime:37.5, x:0.045643821925660286,y:0.17707915273132657 },
    ];

    /* ── State ────────────────────────────────────────────────────────── */
    let overlays  = loadOverlays();
    let editMode  = false;
    let seekTimer = null;
    let dragState = null;   // { card, ov, sx, sy, ox, oy, moved }

    /* ── DOM ──────────────────────────────────────────────────────────── */
    const $up      = document.getElementById('upload-screen');
    const $exp     = document.getElementById('experience');
    const $stage   = document.getElementById('stage');
    const $video   = document.getElementById('video');
    const $vwrap   = document.getElementById('video-wrap');
    const $pulse   = document.getElementById('play-pulse');
    const $ovWrap  = document.getElementById('overlays-wrap');
    const $dragPos = document.getElementById('drag-pos');
    const $pBtn    = document.getElementById('play-btn');
    const $iPlay   = document.getElementById('icon-play');
    const $iPause  = document.getElementById('icon-pause');
    const $tl      = document.getElementById('timeline');
    const $tlFill  = document.getElementById('tl-fill');
    const $tlThumb = document.getElementById('tl-thumb');
    const $timeLbl = document.getElementById('time-label');
    const $editBtn = document.getElementById('edit-btn');
    const $topRight= document.getElementById('top-right');
    const $panel   = document.getElementById('edit-panel');
    const $epList  = document.getElementById('ep-list');
    const $addBtn  = document.getElementById('add-btn');
    const $saveBtn = document.getElementById('save-btn');
    const $saveSt  = document.getElementById('save-status');

    /* ── Helpers ──────────────────────────────────────────────────────── */
    function uid() { return Date.now() + Math.floor(Math.random() * 9999); }
    function fmt(s) {
      if (!isFinite(s) || s < 0) s = 0;
      return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
    }
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── Persistence ──────────────────────────────────────────────────── */
    function loadOverlays() {
      // On HTTP (launcher): load from overlays.json saved in the folder
      if (location.protocol !== 'file:') {
        try {
          const xhr = new XMLHttpRequest();
          xhr.open('GET', './overlays.json', false); // synchronous — file is tiny
          xhr.send();
          if (xhr.status === 200) {
            return JSON.parse(xhr.responseText).map(o => ({ ...o, id: o.id || uid() }));
          }
        } catch (_) {}
      }
      // Fallback: localStorage (direct file:// open)
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch (_) {}
      return DEFAULTS.map(o => ({ ...o, id: uid() }));
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(overlays));
      // On HTTP (launcher): also write back to overlays.json in the folder
      if (location.protocol !== 'file:') {
        fetch('./overlays', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(overlays)
        }).catch(() => {});
      }
    }

    /* ── Video loading ────────────────────────────────────────────────── */
    function activate() {
      $up.classList.add('out');
      setTimeout(() => { $up.style.display='none'; }, 620);
      $exp.classList.add('active');
      buildCards();
    }

    function setVideo(src) {
      $video.src = src;
      $video.load();
      activate();
    }

    // Auto-load default video (direct load — works on file:// and http://)
    $video.addEventListener('error', () => {
      // If video.mp4 can't be loaded, fall back to upload screen
      $up.style.display = '';
      $up.classList.remove('out');
      $exp.classList.remove('active');
    }, { once: true });
    setVideo(DEFAULT_VIDEO);

    document.getElementById('file-input').addEventListener('change', e => { if (e.target.files[0]) setVideo(URL.createObjectURL(e.target.files[0])); });

    const $zone = document.getElementById('upload-zone');
    $zone.addEventListener('dragover',  e => { e.preventDefault(); $zone.classList.add('over'); });
    $zone.addEventListener('dragleave', () => $zone.classList.remove('over'));
    $zone.addEventListener('drop', e => {
      e.preventDefault(); $zone.classList.remove('over');
      if (e.dataTransfer.files[0]) setVideo(URL.createObjectURL(e.dataTransfer.files[0]));
    });

    /* ── Playback ─────────────────────────────────────────────────────── */
    function togglePlay() {
      $video.paused ? $video.play() : $video.pause();
      $pulse.classList.remove('flash');
      void $pulse.offsetWidth;
      $pulse.classList.add('flash');
    }

    $vwrap.addEventListener('click', e => {
      if (e.target.closest('#play-btn')) return;
      // In edit mode, click on a card should not toggle play
      if (editMode && e.target.closest('.overlay-card')) return;
      // If we just finished dragging, don't toggle
      if (dragState && dragState.moved) return;
      togglePlay();
    });
    $pBtn.addEventListener('click', e => { e.stopPropagation(); togglePlay(); });
    $video.addEventListener('play',  () => { $iPlay.style.display='none';  $iPause.style.display='block'; });
    $video.addEventListener('pause', () => { $iPlay.style.display='block'; $iPause.style.display='none'; });

    /* ── Timeline ─────────────────────────────────────────────────────── */
    $video.addEventListener('timeupdate', onTick);
    $video.addEventListener('loadedmetadata', () => {
      $timeLbl.textContent = '0:00 / ' + fmt($video.duration);
      syncCards();
      if (editMode) updateMarkers();
    });

    function onTick() {
      if (!$video.duration) return;
      const pct = ($video.currentTime / $video.duration) * 100;
      $tlFill.style.width = pct + '%';
      $tlThumb.style.left = pct + '%';
      $timeLbl.textContent = fmt($video.currentTime) + ' / ' + fmt($video.duration);
      syncCards();
      if (editMode) highlightActive();
    }

    let scrubbing = false;
    function doScrub(e) {
      if (!$video.duration) return;
      const r = $tl.getBoundingClientRect();
      $video.currentTime = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)) * $video.duration;
    }
    $tl.addEventListener('mousedown', e => { scrubbing=true; doScrub(e); });
    document.addEventListener('mousemove', e => { if (scrubbing) doScrub(e); });
    document.addEventListener('mouseup',   () => { scrubbing=false; });

    /* ── Scroll-to-seek (rAF-batched for smoothness) ─────────────────── */
    let scrollAcc = 0;
    let scrollRAF = null;

    function onWheel(e) {
      if (!$exp.classList.contains('active')) return;
      if (e.target && typeof e.target.closest === 'function' && e.target.closest('#edit-panel')) return;
      if (!(isFinite($video.duration) && $video.duration > 0)) return;

      e.preventDefault();
      scrollAcc += e.deltaY * SCROLL_SPEED;

      if (!scrollRAF) {
        scrollRAF = requestAnimationFrame(() => {
          $video.currentTime = Math.max(0, Math.min($video.duration,
            $video.currentTime + scrollAcc));
          scrollAcc = 0;
          scrollRAF = null;
        });
      }
    }

    window.addEventListener('wheel', onWheel, { passive: false });

    /* ── Keyboard ─────────────────────────────────────────────────────── */
    document.addEventListener('keydown', e => {
      if (e.target.tagName==='INPUT' || e.target.tagName==='TEXTAREA') return;
      if (e.code==='Space')      { e.preventDefault(); togglePlay(); }
      if (e.code==='Escape' && editMode) setEditMode(false);
      if (e.code==='ArrowRight') $video.currentTime = Math.min($video.duration||0, $video.currentTime+5);
      if (e.code==='ArrowLeft')  $video.currentTime = Math.max(0, $video.currentTime-5);
    });

    /* ── Overlay cards (viewer) ───────────────────────────────────────── */
    function buildCards() {
      $ovWrap.innerHTML = '';
      overlays.forEach(ov => {
        const el = document.createElement('div');
        el.className  = 'overlay-card';
        el.dataset.id = ov.id;
        el.style.left = (ov.x * 100) + '%';
        el.style.top  = (ov.y * 100) + '%';
        el.innerHTML  = `
          <div class="drag-handle" title="Drag to reposition">
            <svg viewBox="0 0 16 16" fill="currentColor">
              <circle cx="5"  cy="3.5" r="1.2"/><circle cx="11" cy="3.5" r="1.2"/>
              <circle cx="5"  cy="8"   r="1.2"/><circle cx="11" cy="8"   r="1.2"/>
              <circle cx="5"  cy="12.5" r="1.2"/><circle cx="11" cy="12.5" r="1.2"/>
            </svg>
          </div>
          <div class="overlay-badge">
            <div class="overlay-badge-dot"></div>
            <div class="overlay-badge-text">${esc(ov.badge||'')}</div>
          </div>
          <div class="overlay-title">${esc(ov.title)}</div>
          <div class="overlay-desc">${esc(ov.description)}</div>
        `;
        $ovWrap.appendChild(el);
      });
    }

    function syncCards() {
      const t = $video.currentTime;
      $ovWrap.querySelectorAll('.overlay-card').forEach(card => {
        const ov = overlays.find(o => o.id == card.dataset.id);
        const active = !!ov && t >= ov.startTime && t <= ov.endTime;
        card.classList.toggle('show', active);
        if (ov) {
          card.style.left = (ov.x * 100) + '%';
          card.style.top  = (ov.y * 100) + '%';
        }
      });
    }

    function refreshCardContent(id) {
      const card = $ovWrap.querySelector(`[data-id="${id}"]`);
      const ov   = overlays.find(o => o.id == id);
      if (!card || !ov) return;
      card.querySelector('.overlay-badge-text').textContent = ov.badge || '';
      card.querySelector('.overlay-title').textContent      = ov.title;
      card.querySelector('.overlay-desc').textContent       = ov.description;
    }

    /* ── Drag-to-reposition ───────────────────────────────────────────── */
    $ovWrap.addEventListener('mousedown', e => {
      if (!editMode) return;
      const card = e.target.closest('.overlay-card');
      if (!card || !card.classList.contains('show')) return;
      const ov = overlays.find(o => o.id == card.dataset.id);
      if (!ov) return;

      e.preventDefault();
      e.stopPropagation();

      dragState = {
        card, ov,
        sx: e.clientX, sy: e.clientY,
        ox: ov.x,      oy: ov.y,
        moved: false
      };
    });

    document.addEventListener('mousemove', e => {
      if (!dragState) return;
      const r = $stage.getBoundingClientRect();
      const dx = (e.clientX - dragState.sx) / r.width;
      const dy = (e.clientY - dragState.sy) / r.height;

      if (!dragState.moved && (Math.abs(dx) > 0.003 || Math.abs(dy) > 0.003)) {
        dragState.moved = true;
        dragState.card.style.transition = 'opacity .4s ease, transform .4s ease';
      }

      if (!dragState.moved) return;

      dragState.ov.x = Math.max(0, Math.min(0.9, dragState.ox + dx));
      dragState.ov.y = Math.max(0, Math.min(0.9, dragState.oy + dy));
      dragState.card.style.left = (dragState.ov.x * 100) + '%';
      dragState.card.style.top  = (dragState.ov.y * 100) + '%';

      // Show position tooltip
      const px = Math.round(dragState.ov.x * 100);
      const py = Math.round(dragState.ov.y * 100);
      $dragPos.textContent = px + '% · ' + py + '%';
      $dragPos.style.left  = (e.clientX - r.left + 14) + 'px';
      $dragPos.style.top   = (e.clientY - r.top  - 28) + 'px';
      $dragPos.classList.add('show');
    });

    document.addEventListener('mouseup', () => {
      if (dragState) {
        if (dragState.moved) setStatus('unsaved');
        dragState.card.style.transition = '';
        $dragPos.classList.remove('show');
        dragState = null;
      }
    });

    /* ── Edit mode ────────────────────────────────────────────────────── */
    $editBtn.addEventListener('click', () => setEditMode(!editMode));

    function setEditMode(on) {
      editMode = on;
      document.body.classList.toggle('edit-mode', on);
      $editBtn.classList.toggle('active', on);
      $panel.classList.toggle('open', on);
      // Shift top-right buttons when panel open to keep them visible
      $topRight.style.right = on ? '420px' : '22px';

      if (on) { renderPanel(); updateMarkers(); setStatus(null); }
      else    { clearMarkers(); }
    }

    function renderPanel() {
      const fresh = $epList.cloneNode(false);
      $epList.replaceWith(fresh);
      const list = document.getElementById('ep-list');

      overlays.forEach((ov, i) => {
        const card = document.createElement('div');
        card.className  = 'ep-card';
        card.dataset.id = ov.id;
        card.innerHTML  = `
          <div class="ep-card-top">
            <span class="ep-card-num">Overlay ${i+1}</span>
            <button class="ep-del" data-id="${ov.id}">Delete</button>
          </div>
          <label class="field-label">Badge</label>
          <input class="ep-input" type="text" data-field="badge" data-id="${ov.id}" value="${esc(ov.badge||'')}" placeholder="Phase 01">
          <label class="field-label" style="margin-top:9px">Title</label>
          <input class="ep-input" type="text" data-field="title" data-id="${ov.id}" value="${esc(ov.title)}" placeholder="Phase title">
          <label class="field-label" style="margin-top:9px">Description</label>
          <textarea class="ep-textarea" data-field="description" data-id="${ov.id}" placeholder="Description…">${esc(ov.description)}</textarea>
          <div class="ep-times">
            <div>
              <span class="ep-time-lbl">Start (s)</span>
              <div class="ep-time-row">
                <input class="ep-time-inp" type="number" data-field="startTime" data-id="${ov.id}" value="${ov.startTime}" min="0" step="0.1">
                <button class="ep-now" data-field="startTime" data-id="${ov.id}">⏱ Now</button>
              </div>
            </div>
            <div>
              <span class="ep-time-lbl">End (s)</span>
              <div class="ep-time-row">
                <input class="ep-time-inp" type="number" data-field="endTime" data-id="${ov.id}" value="${ov.endTime}" min="0" step="0.1">
                <button class="ep-now" data-field="endTime" data-id="${ov.id}">⏱ Now</button>
              </div>
            </div>
          </div>
        `;
        list.appendChild(card);
      });

      list.addEventListener('input', onEpInput);
      list.addEventListener('click', onEpClick);
    }

    function onEpInput(e) {
      const { field, id } = e.target.dataset;
      if (!field) return;
      const ov = overlays.find(o => o.id == id);
      if (!ov) return;
      if (field === 'startTime' || field === 'endTime') {
        ov[field] = parseFloat(e.target.value) || 0;
        updateMarkers();
      } else {
        ov[field] = e.target.value;
        refreshCardContent(ov.id);
      }
      setStatus('unsaved');
    }

    function onEpClick(e) {
      if (e.target.classList.contains('ep-del')) {
        const id = Number(e.target.dataset.id);
        overlays = overlays.filter(o => o.id !== id);
        setStatus('unsaved');
        renderPanel(); buildCards(); updateMarkers();
        return;
      }
      if (e.target.classList.contains('ep-now')) {
        const { field, id } = e.target.dataset;
        const ov = overlays.find(o => o.id == id);
        if (!ov) return;
        const t = Math.round($video.currentTime * 10) / 10;
        ov[field] = t;
        const inp = document.querySelector(`.ep-time-inp[data-field="${field}"][data-id="${id}"]`);
        if (inp) inp.value = t;
        setStatus('unsaved');
        updateMarkers();
      }
    }

    $addBtn.addEventListener('click', () => {
      const t = Math.round(($video.currentTime||0)*10)/10;
      overlays.push({ id:uid(), badge:'New Phase', title:'Title', description:'Description of this phase.', startTime:t, endTime:Math.round((t+5)*10)/10, x:0.04, y:0.72 });
      setStatus('unsaved');
      renderPanel(); buildCards(); updateMarkers();
      document.getElementById('ep-list').scrollTop = 99999;
    });

    $saveBtn.addEventListener('click', () => {
      persist();
      $saveSt.textContent='Saved ✓';
      $saveSt.className='saved';
      setTimeout(() => setStatus(null), 2200);
    });

    function setStatus(state) {
      if (state==='unsaved') { $saveSt.textContent='Unsaved changes'; $saveSt.className='unsaved'; }
      else { $saveSt.textContent='All changes saved'; $saveSt.className=''; }
    }

    function highlightActive() {
      const t = $video.currentTime;
      document.querySelectorAll('.ep-card').forEach(card => {
        const ov = overlays.find(o => o.id == card.dataset.id);
        card.classList.toggle('is-active', !!ov && t >= ov.startTime && t <= ov.endTime);
      });
    }

    /* ── Timeline markers ─────────────────────────────────────────────── */
    function updateMarkers() {
      clearMarkers();
      if (!editMode || !$video.duration) return;
      overlays.forEach(ov => {
        [ov.startTime, ov.endTime].forEach(sec => {
          const pct = Math.min(100, Math.max(0, (sec/$video.duration)*100));
          const m = document.createElement('div');
          m.className = 'tl-marker';
          m.style.left = pct + '%';
          $tl.appendChild(m);
        });
      });
    }
    function clearMarkers() { $tl.querySelectorAll('.tl-marker').forEach(m => m.remove()); }

    /* ── Init ─────────────────────────────────────────────────────────── */
    buildCards();
  })();
  </script>
</body>
</html>
